name: Vite React CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      # 3. Install dependencies
      - name: Install Dependencies
        run: npm ci

      # 4. Run Linter (optional but recommended)
      - name: Run Lint
        run: npm run lint || true

      # 5. Build Project
      - name: Build Project
        run: npm run build

      # 6. Preview build (optional safety)
      - name: Check Build Output
        run: ls -la dist
